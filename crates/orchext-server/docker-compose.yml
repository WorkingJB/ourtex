# Reference docker-compose for self-hosting orchext-server.
#
# Usage (from repo root):
#   docker compose -f crates/orchext-server/docker-compose.yml up
#
# Services:
#   - postgres: the state store.
#   - server:   the orchext HTTP API, listening on http://localhost:8080.
#
# Security notes for production:
#   - Replace `ORCHEXT_POSTGRES_PASSWORD` with a strong secret (compose
#     supports .env files; an example is at .env.example).
#   - Put a TLS-terminating reverse proxy (Caddy, Traefik) in front of
#     the server; orchext-server itself serves plain HTTP. The compose
#     file below intentionally omits the proxy so dev is minimal.
#   - Persist the `postgres-data` volume on a backed-up disk.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orchext
      POSTGRES_PASSWORD: ${ORCHEXT_POSTGRES_PASSWORD:-orchext-dev-password}
      POSTGRES_DB: orchext
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchext -d orchext"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not published by default so only the server container can reach it.
    # Uncomment for local DB debugging with psql.
    # ports:
    #   - "5432:5432"

  server:
    build:
      context: ../..
      dockerfile: crates/orchext-server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://orchext:${ORCHEXT_POSTGRES_PASSWORD:-orchext-dev-password}@postgres:5432/orchext
      ORCHEXT_BIND: 0.0.0.0:8080
      ORCHEXT_SECURE_COOKIES: ${ORCHEXT_SECURE_COOKIES:-0}
      ORCHEXT_CORS_ALLOW_ORIGINS: ${ORCHEXT_CORS_ALLOW_ORIGINS:-}
      RUST_LOG: orchext_server=info,axum=info,sqlx=warn
    ports:
      - "8080:8080"
    # Inherits the HEALTHCHECK baked into the Dockerfile (HTTP GET
    # /healthz via wget). Override here only if you want a different
    # interval or to point at /readyz for a deeper DB-included probe.
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
