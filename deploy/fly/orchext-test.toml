# Fly.io configuration for the test/staging orchext-server instance.
#
# Differences from prod (orchext-prod.toml):
#   - Smaller VM (256 MB instead of 1 GB).
#   - `auto_stop_machines = true` — the test env scales to zero when
#     idle. First request after idle pays a ~2s cold start, fine for
#     manual QA but not for end users.
#   - Smaller DB pool (5 instead of 10).
#
# Bring up (run from repo root):
#   flyctl apps create orchext-test --org <your-org>
#   flyctl secrets set DATABASE_URL='postgres://…' --app orchext-test
#   flyctl deploy . --config deploy/fly/orchext-test.toml

app = "orchext-test"
primary_region = "sjc"

[build]
  # Path is relative to this fly.toml; the build context is set to the
  # repo root by passing `.` as the positional arg to `flyctl deploy`.
  dockerfile = "../../crates/orchext-server/Dockerfile"

[env]
  ORCHEXT_BIND = "0.0.0.0:8080"
  ORCHEXT_SECURE_COOKIES = "1"
  ORCHEXT_DB_MAX_CONNECTIONS = "5"
  RUST_LOG = "orchext_server=debug,axum=info,sqlx=warn"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/readyz"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
